<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 24 24"
  width="24"
  height="24"
  fill="none"
  stroke="currentColor"
  stroke-width="1.5"
  stroke-linecap="round"
  stroke-linejoin="round"
  role="img"
  aria-label="Rover"
>
  <!-- Phone bezel: box-drawn silhouette (╭─╮ │ ╰─╯) -->
  <path d="M7 3 Q6 3 6 4 L6 20 Q6 21 7 21 L15 21 Q16 21 16 20 L16 4 Q16 3 15 3 Z" />

  <!-- Notch hint (small top bar) -->
  <path d="M9.5 3 L12.5 3" stroke-width="1.25" />

  <!-- Screen content: prompt + cursor + 3-line menu -->
  <!-- > prompt glyph -->
  <path d="M7.75 8.25 L9.25 9.5 L7.75 10.75" stroke-width="1.1" />
  <!-- Block cursor ▌ -->
  <rect x="10" y="8.75" width="1.4" height="1.5" fill="currentColor" stroke="none" />

  <!-- 3-line menu rows (menu items) -->
  <path d="M7.75 13 L14.25 13" stroke-width="1" />
  <path d="M7.75 15.25 L14.25 15.25" stroke-width="1" />
  <path d="M7.75 17.5 L12.25 17.5" stroke-width="1" />

  <!-- Signal arc leaving the top-right corner: inner + outer suggest a pulse -->
  <path d="M16.75 4.5 Q19.5 4.5 19.5 7.25" />
  <path d="M18 3.25 Q21 3.25 21 6.25" stroke-width="1.1" opacity="0.6" />
  <!-- Pulse dot at arc terminus -->
  <circle cx="19.5" cy="7.25" r="0.85" fill="currentColor" stroke="none" />
</svg>
