name: Rover — PyPI Publish

# Triggered by a tag of the form v0.3.4 pushed to any branch.
# The tag must be created manually (no semantic-release automation).
on:
  push:
    tags:
      - "v*"

jobs:
  build-and-publish:
    name: Build wheel + sdist, publish to PyPI
    runs-on: ubuntu-latest
    environment: pypi
    # Permissions scoped to this job only.
    # Trusted Publisher (OIDC) — no API token required.
    # Configure on PyPI BEFORE first tag push:
    #   pypi.org → Account → Publishing → Add a pending publisher
    #   Publisher: GitHub Actions
    #   Owner:     thepixelabs
    #   Repository: rover
    #   Workflow:  pypi-publish.yml
    #   Environment: pypi
    # NOTE: The existing trusted-publisher config in PyPI still points to
    # thepixelabs/dispatch — update it to thepixelabs/rover before pushing
    # the first v* tag. See Step 4 handoff notes.
    permissions:
      contents: write   # create GitHub Release
      id-token: write   # OIDC token exchange with PyPI

    outputs:
      version: ${{ steps.tag.outputs.version }}
      sdist_sha256: ${{ steps.sdist.outputs.sha256 }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install build frontend
        run: pip install build

      - name: Build wheel and sdist
        run: python -m build

      - name: Publish to PyPI (OIDC trusted publisher)
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1

      # Strip "v" prefix: v0.3.4 → 0.3.4 (PEP 440, matches sdist filename)
      - name: Derive version from tag
        id: tag
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          tag_name: ${{ github.ref_name }}
          name: "Rover ${{ steps.tag.outputs.version }}"
          body: |
            ## Install

            ```bash
            pipx install rover-tui
            ```

            or via Homebrew:

            ```bash
            brew install thepixelabs/tap/rover
            ```
          files: dist/*
          fail_on_unmatched_files: false

      # hatchling normalises rover-tui → rover_tui in artifact filenames.
      - name: Compute sdist sha256
        id: sdist
        run: |
          set -euo pipefail
          SDIST="dist/rover_tui-${{ steps.tag.outputs.version }}.tar.gz"
          if [ ! -f "$SDIST" ]; then
            echo "ERROR: sdist not found at $SDIST"
            ls -la dist/
            exit 1
          fi
          SHA=$(sha256sum "$SDIST" | awk '{print $1}')
          echo "sdist: $SDIST"
          echo "sha256: $SHA"
          echo "sha256=$SHA" >> "$GITHUB_OUTPUT"

  trigger-homebrew-bump:
    name: Trigger Homebrew formula bump
    runs-on: ubuntu-latest
    needs: build-and-publish
    permissions: {}

    steps:
      - name: Generate tap-scoped GitHub App token
        id: app-token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        with:
          app-id: ${{ secrets.HOMEBREW_TAP_APP_ID }}
          private-key: ${{ secrets.HOMEBREW_TAP_APP_PRIVATE_KEY }}
          owner: thepixelabs
          repositories: homebrew-tap

      - name: Dispatch rover-bump event to homebrew-tap
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          VERSION: ${{ needs.build-and-publish.outputs.version }}
          SHA256: ${{ needs.build-and-publish.outputs.sdist_sha256 }}
        run: |
          set -euo pipefail
          if [ -z "$SHA256" ]; then
            echo "ERROR: sdist sha256 is empty — refusing to dispatch"
            exit 1
          fi
          gh api /repos/thepixelabs/homebrew-tap/dispatches \
            -f event_type=rover-bump \
            -F "client_payload[version]=$VERSION" \
            -F "client_payload[sha256]=$SHA256"
