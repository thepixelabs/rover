name: Rover — PyPI Publish

# Triggered by a tag of the form rover-v0.3.4 pushed to any branch.
# The tag must be created manually — it is NOT created by the semantic-release
# flow, which owns non-prefixed tags.
on:
  push:
    tags:
      - "rover-v*"

jobs:
  build-and-publish:
    name: Build wheel + sdist, publish to PyPI
    runs-on: ubuntu-latest
    environment: pypi
    # Permissions scoped to this job only.
    # Trusted Publisher (OIDC) — no API token required.
    # Configure on PyPI BEFORE first tag push:
    #   pypi.org → Account → Publishing → Add a pending publisher
    #   Publisher: GitHub Actions
    #   Owner:     thepixelabs
    #   Repository: dispatch
    #   Workflow:  rover-pypi-publish.yml
    #   Environment: pypi
    permissions:
      contents: write   # create GitHub Release
      id-token: write   # OIDC token exchange with PyPI

    outputs:
      version: ${{ steps.tag.outputs.version }}
      sdist_sha256: ${{ steps.sdist.outputs.sha256 }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Install build frontend
        run: pip install build

      # Build from rover/ so hatchling picks up rover/pyproject.toml (name = rover-tui).
      - name: Build wheel and sdist
        working-directory: rover
        run: python -m build

      # Move dist/ to repo root — pypa/gh-action-pypi-publish expects dist/ at root.
      - name: Move dist to repo root
        run: mv rover/dist dist

      - name: Publish to PyPI (OIDC trusted publisher)
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1

      # Strip "rover-v" prefix: rover-v0.3.4 → 0.3.4 (PEP 440, matches sdist filename)
      - name: Derive version from tag
        id: tag
        run: echo "version=${GITHUB_REF_NAME#rover-v}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          tag_name: ${{ github.ref_name }}
          name: "Rover ${{ steps.tag.outputs.version }}"
          body: |
            ## Install

            ```bash
            pipx install rover-tui
            ```

            or via Homebrew:

            ```bash
            brew install thepixelabs/tap/rover
            ```

            or via the full installer (includes tmux config + SSH auto-launch):

            ```bash
            curl -fsSL https://raw.githubusercontent.com/thepixelabs/dispatch/main/rover/install.sh | bash
            ```
          files: dist/*
          fail_on_unmatched_files: false

      # hatchling normalises rover-tui → rover_tui in artifact filenames.
      - name: Compute sdist sha256
        id: sdist
        run: |
          set -euo pipefail
          SDIST="dist/rover_tui-${{ steps.tag.outputs.version }}.tar.gz"
          if [ ! -f "$SDIST" ]; then
            echo "ERROR: sdist not found at $SDIST"
            ls -la dist/
            exit 1
          fi
          SHA=$(sha256sum "$SDIST" | awk '{print $1}')
          echo "sdist: $SDIST"
          echo "sha256: $SHA"
          echo "sha256=$SHA" >> "$GITHUB_OUTPUT"

  trigger-homebrew-bump:
    name: Trigger Homebrew formula bump
    runs-on: ubuntu-latest
    needs: build-and-publish
    permissions: {}

    steps:
      # Use the existing tap-scoped GitHub App — same one used by dmg-release.yml.
      - name: Generate tap-scoped GitHub App token
        id: app-token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        with:
          app-id: ${{ secrets.HOMEBREW_TAP_APP_ID }}
          private-key: ${{ secrets.HOMEBREW_TAP_APP_PRIVATE_KEY }}
          owner: thepixelabs
          repositories: homebrew-tap

      # Use repository_dispatch (needs contents:write only — the App already has it,
      # as proven by dmg-release.yml). workflow_dispatch would require actions:write,
      # which the tap-scoped App is not granted.
      - name: Dispatch rover-bump event to homebrew-tap
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          VERSION: ${{ needs.build-and-publish.outputs.version }}
          SHA256: ${{ needs.build-and-publish.outputs.sdist_sha256 }}
        run: |
          set -euo pipefail
          if [ -z "$SHA256" ]; then
            echo "ERROR: sdist sha256 is empty — refusing to dispatch"
            exit 1
          fi
          gh api /repos/thepixelabs/homebrew-tap/dispatches \
            -f event_type=rover-bump \
            -F "client_payload[version]=$VERSION" \
            -F "client_payload[sha256]=$SHA256"
