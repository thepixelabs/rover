name: Rover — PyPI Publish

# Triggered by a tag of the form rover-v0.3.4 pushed to any branch.
# The tag must be created manually — it is NOT created by the semantic-release
# flow, which owns non-prefixed tags.
on:
  push:
    tags:
      - "rover-v*"

jobs:
  build-and-publish:
    name: Build wheel + sdist, publish to PyPI
    runs-on: ubuntu-latest
    environment: pypi
    # Permissions scoped to this job only.
    # Trusted Publisher (OIDC) — no API token required.
    # Configure on PyPI BEFORE first tag push:
    #   pypi.org → Account → Publishing → Add a pending publisher
    #   Publisher: GitHub Actions
    #   Owner:     thepixelabs
    #   Repository: dispatch
    #   Workflow:  rover-pypi-publish.yml
    #   Environment: pypi
    permissions:
      contents: write   # create GitHub Release
      id-token: write   # OIDC token exchange with PyPI

    outputs:
      version: ${{ steps.tag.outputs.version }}
      sdist_sha256: ${{ steps.sdist.outputs.sha256 }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build frontend
        run: pip install build

      # Build from rover/ so hatchling picks up rover/pyproject.toml (name = rover-tui).
      - name: Build wheel and sdist
        working-directory: rover
        run: python -m build

      # Move dist/ to repo root — pypa/gh-action-pypi-publish expects dist/ at root.
      - name: Move dist to repo root
        run: mv rover/dist dist

      - name: Publish to PyPI (OIDC trusted publisher)
        uses: pypa/gh-action-pypi-publish@release/v1

      # Strip "rover-" prefix: rover-v0.3.4 → v0.3.4
      - name: Derive version from tag
        id: tag
        run: echo "version=${GITHUB_REF_NAME#rover-}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "Rover ${{ steps.tag.outputs.version }}"
          body: |
            ## Install

            ```bash
            pipx install rover-tui
            ```

            or via Homebrew:

            ```bash
            brew install thepixelabs/tap/rover
            ```

            or via the full installer (includes tmux config + SSH auto-launch):

            ```bash
            curl -fsSL https://raw.githubusercontent.com/thepixelabs/dispatch/main/rover/install.sh | bash
            ```
          files: dist/*
          fail_on_unmatched_files: false

      # hatchling normalises rover-tui → rover_tui in artifact filenames.
      - name: Compute sdist sha256
        id: sdist
        run: |
          SDIST="dist/rover_tui-${{ steps.tag.outputs.version }}.tar.gz"
          echo "sha256=$(sha256sum "$SDIST" | awk '{print $1}')" >> "$GITHUB_OUTPUT"

  trigger-homebrew-bump:
    name: Trigger Homebrew formula bump
    runs-on: ubuntu-latest
    needs: build-and-publish
    permissions: {}

    steps:
      # Use the existing tap-scoped GitHub App — same one used by dmg-release.yml.
      - name: Generate tap-scoped GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.HOMEBREW_TAP_APP_ID }}
          private-key: ${{ secrets.HOMEBREW_TAP_APP_PRIVATE_KEY }}
          owner: thepixelabs
          repositories: homebrew-tap

      - name: Dispatch rover-formula-bump workflow in homebrew-tap
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          gh workflow run rover-formula-bump.yml \
            --repo thepixelabs/homebrew-tap \
            --field version="${{ needs.build-and-publish.outputs.version }}" \
            --field sha256="${{ needs.build-and-publish.outputs.sdist_sha256 }}"
